<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PanganKu - Marketplace Lokal Indonesia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2E7D32', primaryDark: '#1B5E20', accent: '#F57C00', primaryLight: '#E8F5E9' },
          fontFamily: { inter: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    /* Dropdown yang stabil - TIDAK ILANG SAAT DIKLIK */
    .dropdown-container {
      position: relative;
      display: inline-block;
    }
    .dropdown-menu {
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 8px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      min-width: 220px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
      transform: translateY(-10px);
    }
    .dropdown-container:hover .dropdown-menu,
    .dropdown-container:focus-within .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .dropdown-menu button {
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #374151;
    }
    .dropdown-menu button:hover {
      background: #E8F5E9;
    }
    .dropdown-menu button:first-child {
      border-radius: 12px 12px 0 0;
    }
    .dropdown-menu button:last-child {
      border-radius: 0 0 12px 12px;
      color: #dc2626;
    }
    .product-card { transition: all 0.3s ease; cursor: pointer; }
    .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2); }
    .toast-notif { animation: slideIn 0.3s ease; position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="font-inter antialiased bg-gray-50">

<div id="app"></div>

<script>
  // ========== DATABASE LENGKAP ==========
  let currentUser = JSON.parse(localStorage.getItem('panganku_user') || 'null');
  let users = JSON.parse(localStorage.getItem('panganku_users') || '[]');
  let products = JSON.parse(localStorage.getItem('panganku_products') || '[]');
  let carts = JSON.parse(localStorage.getItem('panganku_carts') || '[]');
  let orders = JSON.parse(localStorage.getItem('panganku_orders') || '[]');
  let wishlists = JSON.parse(localStorage.getItem('panganku_wishlists') || '[]');
  let notifications = JSON.parse(localStorage.getItem('panganku_notifications') || '[]');
  let addresses = JSON.parse(localStorage.getItem('panganku_addresses') || '[]');
  let vouchers = JSON.parse(localStorage.getItem('panganku_vouchers') || '[]');

  function saveAll() {
    localStorage.setItem('panganku_users', JSON.stringify(users));
    localStorage.setItem('panganku_products', JSON.stringify(products));
    localStorage.setItem('panganku_carts', JSON.stringify(carts));
    localStorage.setItem('panganku_orders', JSON.stringify(orders));
    localStorage.setItem('panganku_wishlists', JSON.stringify(wishlists));
    localStorage.setItem('panganku_notifications', JSON.stringify(notifications));
    localStorage.setItem('panganku_addresses', JSON.stringify(addresses));
    localStorage.setItem('panganku_vouchers', JSON.stringify(vouchers));
    if (currentUser) localStorage.setItem('panganku_user', JSON.stringify(currentUser));
    else localStorage.removeItem('panganku_user');
  }

  function formatRupiah(amount) {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
  }

  function addNotif(userId, title, message) {
    notifications.unshift({ id: Date.now(), userId, title, message, read: false, createdAt: new Date().toISOString() });
    saveAll();
    if (currentUser && currentUser.id === userId) updateNotifBadge();
  }

  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast-notif bg-${type === 'success' ? 'primary' : 'accent'} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-2`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function updateNotifBadge() {
    const badge = document.getElementById('notifBadgeCount');
    if (badge) {
      const unread = notifications.filter(n => n.userId === currentUser?.id && !n.read).length;
      badge.textContent = unread;
      badge.classList.toggle('hidden', unread === 0);
    }
  }

  function getCartCount() { return carts.filter(c => c.userId === currentUser?.id).reduce((s, i) => s + i.qty, 0); }
  function isInWishlist(productId) { return wishlists.some(w => w.userId === currentUser?.id && w.productId === productId); }
  function toggleWishlist(productId) {
    const idx = wishlists.findIndex(w => w.userId === currentUser.id && w.productId === productId);
    if (idx !== -1) wishlists.splice(idx, 1);
    else wishlists.push({ id: Date.now(), userId: currentUser.id, productId });
    saveAll();
    showToast(idx !== -1 ? 'Dihapus dari favorit' : 'Ditambahkan ke favorit');
    renderApp();
  }

  function setUser(user) { currentUser = user; saveAll(); renderApp(); }
  function logout() { currentUser = null; saveAll(); renderApp(); }

  let currentPage = 'landing';
  let regState = { step: 1, role: null, formData: {} };

  // SEED DATA
  if (users.length === 0) {
    users.push({ id: 1, role: 'buyer', name: 'Budi Santoso', email: 'buyer@panganku.com', password: '123456', phone: '081234567890', avatar: '👨', joinDate: '2024-01-15' });
    users.push({ id: 2, role: 'seller', name: 'Ibu Dewi', email: 'seller@panganku.com', password: '123456', phone: '082222333444', businessName: 'Dapur Nusantara', avatar: '👩‍🍳', joinDate: '2023-12-01' });
    users.push({ id: 3, role: 'farmer', name: 'Pak Slamet', email: 'farmer@panganku.com', password: '123456', phone: '083333444555', farmName: 'Tani Organik Sejahtera', avatar: '👨‍🌾', joinDate: '2023-11-20' });
    addresses.push({ id: 1, userId: 1, label: 'Rumah', recipient: 'Budi Santoso', phone: '081234567890', address: 'Jl. Sudirman No. 123, Jakarta Selatan', isPrimary: true });
    vouchers.push({ id: 1, code: 'FREEONGKIR', discount: 15000, minPurchase: 75000, type: 'shipping', expiry: '2025-12-31' });
    vouchers.push({ id: 2, code: 'PANGAN10', discount: 10000, minPurchase: 50000, type: 'product', expiry: '2025-12-31' });
    
    const productList = [
      { id: 101, name: 'Paket Sayur Organik', price: 55000, originalPrice: 75000, rating: 4.8, sold: 1234, image: '🥬', category: 'Sayuran', sellerId: 3, sellerName: 'Tani Organik', stock: 50, description: 'Sayur segar dari petani lokal', location: 'Bogor', weight: '2kg' },
      { id: 102, name: 'Nasi Goreng Spesial', price: 28000, originalPrice: 35000, rating: 4.9, sold: 2512, image: '🍳', category: 'Makanan', sellerId: 2, sellerName: 'Dapur Nusantara', stock: 30, description: 'Nasi goreng homemade dengan bumbu rempah', location: 'Bandung', weight: '500g' },
      { id: 103, name: 'Rendang Sapi Padang', price: 65000, originalPrice: 85000, rating: 4.9, sold: 889, image: '🍲', category: 'Makanan', sellerId: 2, sellerName: 'Dapur Nusantara', stock: 25, description: 'Rendang daging sapi asli Padang', location: 'Bandung', weight: '350g' },
      { id: 104, name: 'Tomat Cherry', price: 25000, originalPrice: 35000, rating: 4.7, sold: 3456, image: '🍅', category: 'Sayuran', sellerId: 3, sellerName: 'Tani Organik', stock: 100, description: 'Tomat cherry manis, organik', location: 'Bogor', weight: '500g' },
      { id: 105, name: 'Kombucha Rempah', price: 18000, originalPrice: 25000, rating: 4.6, sold: 678, image: '🧃', category: 'Minuman', sellerId: 2, sellerName: 'Dapur Nusantara', stock: 40, description: 'Minuman probiotik sehat', location: 'Bandung', weight: '300ml' },
      { id: 106, name: 'Nasi Uduk Komplit', price: 22000, originalPrice: 30000, rating: 4.8, sold: 1520, image: '🍚', category: 'Makanan', sellerId: 2, sellerName: 'Dapur Nusantara', stock: 15, description: 'Nasi uduk dengan ayam goreng, tempe orek', location: 'Bandung', weight: '1 porsi' },
      { id: 107, name: 'Jeruk Lokal 1kg', price: 18000, originalPrice: 25000, rating: 4.5, sold: 5432, image: '🍊', category: 'Buah', sellerId: 3, sellerName: 'Tani Organik', stock: 200, description: 'Jeruk manis segar dari kebun', location: 'Bogor', weight: '1kg' },
      { id: 108, name: 'Sambal Terasi', price: 15000, originalPrice: 22000, rating: 4.9, sold: 987, image: '🌶️', category: 'Bumbu', sellerId: 2, sellerName: 'Dapur Nusantara', stock: 50, description: 'Sambal terasi homemade', location: 'Bandung', weight: '200g' },
    ];
    products.push(...productList);
    saveAll();
  }

  function renderApp() {
    const app = document.getElementById('app');
    if (currentUser) {
      if (currentUser.role === 'buyer') renderBuyerApp(app);
      else if (currentUser.role === 'seller') renderSellerApp(app);
      else if (currentUser.role === 'farmer') renderFarmerApp(app);
    } else {
      if (currentPage === 'login') renderLoginPage(app);
      else if (currentPage === 'register') renderRegisterPage(app);
      else renderLandingPage(app);
    }
  }

  // ========== LANDING PAGE ==========
  function renderLandingPage(container) {
    container.innerHTML = `
      <nav class="sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-lg py-4 px-6"><div class="max-w-7xl mx-auto flex justify-between items-center"><div class="text-2xl font-bold text-primary flex items-center gap-2"><i class="fas fa-leaf"></i> Pangan<span class="text-accent">Ku</span></div><div class="hidden md:flex gap-8 items-center"><a href="#home" class="text-gray-600 hover:text-primary">Beranda</a><a href="#fitur" class="text-gray-600 hover:text-primary">Fitur</a><a href="#produk" class="text-gray-600 hover:text-primary">Produk</a><a href="#testimoni" class="text-gray-600 hover:text-primary">Testimoni</a><button id="navLoginBtn" class="border-2 border-primary text-primary px-6 py-2 rounded-full hover:bg-primary hover:text-white transition-all">Masuk</button><button id="navRegisterBtn" class="bg-primary text-white px-6 py-2 rounded-full hover:bg-primaryDark shadow-md transition-all">Daftar Gratis</button></div></div></nav>
      <section id="home" class="relative overflow-hidden bg-gradient-to-br from-primaryLight via-white to-white py-24 px-6"><div class="absolute top-20 right-10 text-8xl opacity-10 animate-float">🥬</div><div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center"><div><div class="inline-flex items-center gap-2 bg-primary/10 px-4 py-2 rounded-full mb-6"><i class="fas fa-store text-primary"></i><span class="text-primary font-medium">Marketplace Lokal Indonesia</span></div><h1 class="text-5xl md:text-6xl font-extrabold leading-tight text-gray-800">Makanan Segar, <span class="text-primary">Langsung</span> dari Sumbernya</h1><p class="text-gray-500 text-lg mt-6">PanganKu menghubungkan kamu dengan petani lokal dan UMKM untuk pilihan makanan yang lebih sehat, segar, dan terjangkau.</p><div class="flex gap-4 mt-8"><button id="heroGetStarted" class="bg-primary text-white px-8 py-3 rounded-full font-semibold shadow-lg hover:bg-primaryDark transition-all">Mulai Belanja →</button><button id="heroExplore" class="border-2 border-gray-300 px-8 py-3 rounded-full font-semibold hover:border-primary hover:text-primary transition-all">Lihat Produk</button></div></div><div class="relative"><div class="bg-gradient-to-br from-primary/10 to-primaryLight/30 rounded-3xl p-8 shadow-2xl"><div class="grid grid-cols-3 gap-4"><div class="bg-white rounded-2xl p-4 shadow-md text-center"><div class="text-5xl">🥬</div><p class="font-semibold">Sayur Segar</p></div><div class="bg-white rounded-2xl p-4 shadow-md text-center transform translate-y-2"><div class="text-5xl">🍳</div><p class="font-semibold">Homemade</p></div><div class="bg-white rounded-2xl p-4 shadow-md text-center"><div class="text-5xl">🍊</div><p class="font-semibold">Buah Lokal</p></div></div><div class="mt-6 text-center"><i class="fas fa-hand-holding-heart text-5xl text-primary opacity-70"></i><p class="mt-2 text-gray-600">🌾 Petani → UMKM → Pembeli</p></div></div></div></div></section>
      <section class="py-16 px-6 bg-white"><div class="max-w-7xl mx-auto grid md:grid-cols-4 gap-8 text-center"><div><div class="text-4xl font-bold text-primary">200+</div><p class="text-gray-500">UMKM Mitra</p></div><div><div class="text-4xl font-bold text-primary">50+</div><p class="text-gray-500">Petani Lokal</p></div><div><div class="text-4xl font-bold text-primary">1000+</div><p class="text-gray-500">Pelanggan Puas</p></div><div><div class="text-4xl font-bold text-primary">4.9</div><p class="text-gray-500">Rating Pengguna</p></div></div></section>
      <section id="fitur" class="py-20 px-6 bg-grayBg"><div class="max-w-7xl mx-auto text-center"><h2 class="text-3xl md:text-4xl font-bold text-gray-800">Kenapa Memilih <span class="text-primary">PanganKu</span>?</h2><div class="grid md:grid-cols-3 gap-8 mt-12"><div class="bg-white p-8 rounded-2xl shadow-lg"><div class="w-20 h-20 bg-primaryLight rounded-full flex items-center justify-center mx-auto mb-5"><i class="fas fa-seedling text-3xl text-primary"></i></div><h3 class="text-xl font-bold">🌱 Segar & Lokal</h3><p class="text-gray-500 mt-2">Produk langsung dari petani dan UMKM</p></div><div class="bg-white p-8 rounded-2xl shadow-lg"><div class="w-20 h-20 bg-primaryLight rounded-full flex items-center justify-center mx-auto mb-5"><i class="fas fa-tag text-3xl text-primary"></i></div><h3 class="text-xl font-bold">💸 Harga Terjangkau</h3><p class="text-gray-500 mt-2">Tanpa perantara, harga lebih bersahabat</p></div><div class="bg-white p-8 rounded-2xl shadow-lg"><div class="w-20 h-20 bg-primaryLight rounded-full flex items-center justify-center mx-auto mb-5"><i class="fas fa-truck-fast text-3xl text-primary"></i></div><h3 class="text-xl font-bold">🚚 Pengiriman Cepat</h3><p class="text-gray-500 mt-2">Diantarkan dari penjual terdekat</p></div></div></div></section>
      <section id="produk" class="py-20 px-6 bg-white"><div class="max-w-7xl mx-auto"><h2 class="text-3xl md:text-4xl font-bold text-center text-gray-800">🔥 Produk <span class="text-primary">Terlaris</span></h2><div class="grid grid-cols-2 md:grid-cols-4 gap-5 mt-12">${products.slice(0, 8).map(p => `<div class="bg-white rounded-2xl overflow-hidden shadow-lg product-card" data-product='${JSON.stringify(p)}'><div class="h-40 flex items-center justify-center text-6xl bg-primaryLight">${p.image}</div><div class="p-4"><h3 class="font-semibold text-gray-800">${p.name}</h3><p class="text-primary font-bold mt-1">${formatRupiah(p.price)}</p><div class="flex items-center gap-1 mt-1"><i class="fas fa-star text-yellow-400 text-sm"></i><span class="text-sm">${p.rating}</span><span class="text-xs text-gray-400 ml-2">Terjual ${p.sold}</span></div></div></div>`).join('')}</div><div class="text-center mt-10"><button id="viewAllProducts" class="px-8 py-3 rounded-full border-2 border-primary text-primary font-semibold hover:bg-primary hover:text-white transition-all">Lihat Semua Produk →</button></div></div></section>
      <section id="testimoni" class="py-20 px-6 bg-grayBg"><div class="max-w-7xl mx-auto"><h2 class="text-3xl md:text-4xl font-bold text-center text-gray-800">Apa Kata <span class="text-primary">Mereka</span>?</h2><div class="grid md:grid-cols-3 gap-8 mt-12"><div class="bg-white p-6 rounded-2xl shadow-md"><div class="flex items-center gap-3 mb-4"><div class="w-12 h-12 bg-primaryLight rounded-full flex items-center justify-center text-2xl">👩</div><div><p class="font-bold">Anisa Rahma</p><div class="flex text-yellow-400"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div></div></div><p class="text-gray-600">"Sayuran segar langsung dari petani! Harganya lebih murah dari pasar. Recomended!"</p></div><div class="bg-white p-6 rounded-2xl shadow-md"><div class="flex items-center gap-3 mb-4"><div class="w-12 h-12 bg-primaryLight rounded-full flex items-center justify-center text-2xl">👨</div><div><p class="font-bold">Budi Santoso</p><div class="flex text-yellow-400"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div></div></div><p class="text-gray-600">"Platformnya mudah digunakan, pengiriman cepat. UMKM lokal jadi semakin dikenal!"</p></div><div class="bg-white p-6 rounded-2xl shadow-md"><div class="flex items-center gap-3 mb-4"><div class="w-12 h-12 bg-primaryLight rounded-full flex items-center justify-center text-2xl">👨‍🌾</div><div><p class="font-bold">Pak Slamet</p><div class="flex text-yellow-400"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div></div></div><p class="text-gray-600">"Jual hasil panen tanpa tengkulak, pendapatan lebih stabil. Terima kasih PanganKu!"</p></div></div></div></section>
      <section class="bg-gradient-to-r from-primary to-primaryDark py-20 px-6 text-center text-white"><h2 class="text-3xl md:text-4xl font-bold">Siap Memulai Perjalanan Bersama PanganKu?</h2><div class="flex flex-wrap justify-center gap-4 mt-8"><button id="ctaRegisterNow" class="bg-white text-primary px-8 py-3 rounded-full font-bold shadow-lg hover:shadow-xl transition-all">Daftar Sekarang</button><button id="ctaJoinSeller" class="border-2 border-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-primary transition-all">Gabung sebagai UMKM</button></div></section>
      <footer class="bg-gray-900 text-white/70 py-12 px-6"><div class="max-w-7xl mx-auto text-center">© 2025 PanganKu — Membangun Ekosistem Pangan Lokal Indonesia</div></footer>
    `;
    attachLandingEvents();
  }

  function attachLandingEvents() {
    document.getElementById('navLoginBtn')?.addEventListener('click', () => { currentPage = 'login'; renderApp(); });
    document.getElementById('navRegisterBtn')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('heroGetStarted')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('heroExplore')?.addEventListener('click', () => { showToast('✨ Silakan login untuk melihat semua produk!', 'info'); setTimeout(() => { currentPage = 'login'; renderApp(); }, 1500); });
    document.getElementById('ctaRegisterNow')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('ctaJoinSeller')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; setTimeout(() => { document.querySelector('.role-card[data-role="seller"]')?.click(); }, 100); renderApp(); });
    document.getElementById('viewAllProducts')?.addEventListener('click', () => { showToast('✨ Silakan login untuk melihat semua produk!', 'info'); setTimeout(() => { currentPage = 'login'; renderApp(); }, 1500); });
    document.querySelectorAll('[data-product]').forEach(card => card.addEventListener('click', () => { const p = JSON.parse(card.dataset.product); alert(`🛍️ ${p.name}\n💰 ${formatRupiah(p.price)}\n⭐ ${p.rating}\n📍 ${p.location}\n📝 ${p.description}`); }));
  }

  function renderLoginPage(container) {
    container.innerHTML = `<div class="min-h-screen bg-gradient-to-br from-primaryLight to-white flex items-center justify-center p-4"><div class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-wrap md:flex-nowrap"><div class="w-full md:w-1/2 bg-gradient-to-br from-primary to-primaryDark p-8 text-center text-white"><i class="fas fa-leaf text-5xl mb-4"></i><h2 class="text-3xl font-bold">PanganKu</h2><p>Marketplace Lokal Indonesia</p></div><div class="w-full md:w-1/2 p-8"><button id="backToLandingBtn" class="text-gray-400 hover:text-primary mb-4"><i class="fas fa-arrow-left"></i> Kembali</button><h2 class="text-2xl font-bold">Masuk ke Akun</h2><div class="mt-6 space-y-3"><input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border rounded-xl"><input type="password" id="loginPassword" placeholder="Kata Sandi" class="w-full p-3 border rounded-xl"><button id="doLogin" class="w-full bg-primary text-white py-3 rounded-xl font-semibold">Masuk</button><div class="bg-gray-50 p-3 rounded-xl text-xs text-center"><p class="font-semibold">🔐 Akun Demo:</p><p>Pembeli: buyer@panganku.com / 123456<br>UMKM: seller@panganku.com / 123456<br>Petani: farmer@panganku.com / 123456</p></div></div></div></div></div>`;
    document.getElementById('doLogin')?.addEventListener('click', () => { const email = document.getElementById('loginEmail').value; const pwd = document.getElementById('loginPassword').value; const user = users.find(u => u.email === email && u.password === pwd); if (user) setUser(user); else alert('Email atau password salah'); });
    document.getElementById('backToLandingBtn')?.addEventListener('click', () => { currentPage = 'landing'; renderApp(); });
  }

  function renderRegisterPage(container) {
    if (regState.step === 1) {

      container.innerHTML = `<div class="min-h-screen bg-gradient-to-br from-primaryLight to-white flex items-center justify-center p-4"><div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-8"><button id="backStep2" class="text-gray-400 mb-4"><i class="fas fa-arrow-left"></i> Kembali</button><h2 class="text-2xl font-bold">${regState.role === 'seller' ? 'Data UMKM' : regState.role === 'farmer' ? 'Data Petani' : 'Selesai'}</h2><div class="mt-4">${extra}</div><button id="completeReg" class="w-full mt-6 bg-primary text-white py-3 rounded-xl">Daftar</button></div></div>`;

  function attachBuyerEvents() {
    // Add to cart
    document.querySelectorAll('.addToCartBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const pid = parseInt(btn.dataset.id); const p = products.find(p => p.id === pid); if (p.stock <= 0) { showToast('Stok habis!', 'info'); return; } const existing = carts.find(c => c.userId === currentUser.id && c.productId === pid); if (existing) existing.qty++; else carts.push({ id: Date.now(), userId: currentUser.id, productId: pid, qty: 1 }); saveAll(); showToast(`${p.name} ditambahkan ke keranjang`); renderApp(); }));
    
    // Wishlist
    document.querySelectorAll('.wishlistBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleWishlist(parseInt(btn.dataset.id)); }));
    
    // Product card click
    document.querySelectorAll('.product-card').forEach(card => card.addEventListener('click', () => { const p = JSON.parse(card.dataset.product); alert(`🛍️ ${p.name}\n💰 ${formatRupiah(p.price)}\n⭐ ${p.rating} | Terjual ${p.sold}\n📍 ${p.location}\n📝 ${p.description}\n⚖️ Berat: ${p.weight}`); }));
    
    // Cart
    document.getElementById('cartIcon')?.addEventListener('click', () => { updateCartModalUI(); document.getElementById('cartModal').classList.remove('hidden'); });
    document.getElementById('closeCart')?.addEventListener('click', () => document.getElementById('cartModal').classList.add('hidden'));
    document.getElementById('checkoutBtn')?.addEventListener('click', () => { if (carts.filter(c => c.userId === currentUser.id).length === 0) { showToast('Keranjang kosong', 'info'); return; } showCheckoutModal(); });
    
    // Notifications
    document.getElementById('notifIcon')?.addEventListener('click', () => { document.getElementById('notifModal').classList.remove('hidden'); notifications.filter(n => n.userId === currentUser.id).forEach(n => n.read = true); saveAll(); updateNotifBadge(); renderApp(); });
    document.getElementById('closeNotif')?.addEventListener('click', () => document.getElementById('notifModal').classList.add('hidden'));
    
    // Dropdown menu buttons - SEMUA BISA DIKLIK
    document.getElementById('myOrdersBtn')?.addEventListener('click', () => document.getElementById('ordersModal').classList.remove('hidden'));
    document.getElementById('closeOrders')?.addEventListener('click', () => document.getElementById('ordersModal').classList.add('hidden'));
    document.getElementById('wishlistBtn')?.addEventListener('click', () => document.getElementById('wishlistModal').classList.remove('hidden'));
    document.getElementById('closeWishlist')?.addEventListener('click', () => document.getElementById('wishlistModal').classList.add('hidden'));
    document.getElementById('voucherBtn')?.addEventListener('click', () => document.getElementById('voucherModal').classList.remove('hidden'));
    document.getElementById('closeVoucher')?.addEventListener('click', () => document.getElementById('voucherModal').classList.add('hidden'));
    document.getElementById('addressBtn')?.addEventListener('click', () => document.getElementById('addressModal').classList.remove('hidden'));
    document.getElementById('closeAddress')?.addEventListener('click', () => document.getElementById('addressModal').classList.add('hidden'));
    document.getElementById('profileBtn')?.addEventListener('click', () => document.getElementById('profileModal').classList.remove('hidden'));
    document.getElementById('closeProfile')?.addEventListener('click', () => document.getElementById('profileModal').classList.add('hidden'));
    document.getElementById('settingsBtn')?.addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
    document.getElementById('closeSettings')?.addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
    document.getElementById('faqBtn')?.addEventListener('click', () => document.getElementById('faqModal').classList.remove('hidden'));
    document.getElementById('closeFaq')?.addEventListener('click', () => document.getElementById('faqModal').classList.add('hidden'));
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('logoDashboard')?.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    
    // Change password
    document.getElementById('changePasswordBtn')?.addEventListener('click', () => { const oldPass = document.getElementById('oldPass').value; const newPass = document.getElementById('newPass').value; const confirm = document.getElementById('confirmPass').value; if (oldPass !== currentUser.password) { alert('Password lama salah'); return; } if (newPass !== confirm) { alert('Password baru tidak cocok'); return; } currentUser.password = newPass; users = users.map(u => u.id === currentUser.id ? currentUser : u); saveAll(); alert('Password berhasil diubah!'); document.getElementById('settingsModal').classList.add('hidden'); });
    
    // Remove wishlist
    document.querySelectorAll('.removeWishlistBtn').forEach(btn => btn.addEventListener('click', () => { wishlists = wishlists.filter(w => !(w.userId === currentUser.id && w.productId === parseInt(btn.dataset.id))); saveAll(); renderApp(); }));
    
    // Track order
    document.querySelectorAll('.trackBtn').forEach(btn => btn.addEventListener('click', () => { const order = orders.find(o => o.id === parseInt(btn.dataset.id)); if (order) { document.getElementById('trackingInfo').innerHTML = `<div class="space-y-3"><div class="flex items-center gap-2"><div class="w-2 h-2 bg-green-500 rounded-full"></div><span>Pesanan diterima</span></div><div class="flex items-center gap-2"><div class="w-2 h-2 ${order.status !== 'Pending' ? 'bg-green-500' : 'bg-gray-300'} rounded-full"></div><span>Diproses</span></div><div class="flex items-center gap-2"><div class="w-2 h-2 ${order.status === 'Dikirim' ? 'bg-green-500' : 'bg-gray-300'} rounded-full"></div><span>Dikirim</span></div></div><p class="text-sm text-gray-500 mt-3">No. Resi: ${order.trackingNumber || 'PANGANKU' + order.id}</p><p class="text-xs text-gray-400">Estimasi tiba: ${new Date(Date.now() + 3*24*60*60*1000).toLocaleDateString()}</p>`; document.getElementById('trackingModal').classList.remove('hidden'); } }));
    document.getElementById('closeTracking')?.addEventListener('click', () => document.getElementById('trackingModal').classList.add('hidden'));
    
    // Search
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => { const search = e.target.value.toLowerCase(); document.querySelectorAll('.product-card').forEach(card => { const name = card.querySelector('h4')?.innerText.toLowerCase(); card.style.display = name?.includes(search) ? 'block' : 'none'; }); });
    }
  }

  function updateCartModalUI() {
    const userCart = carts.filter(c => c.userId === currentUser.id);
    const cartDiv = document.getElementById('cartItemsList');
    if (cartDiv) {
      cartDiv.innerHTML = userCart.map(c => { const p = products.find(p => p.id === c.productId); return `<div class="flex justify-between items-center border-b py-3"><div><p class="font-medium">${p?.name}</p><p>${formatRupiah(p?.price)}</p></div><div class="flex gap-2 items-center"><button class="qtyMinus w-7 h-7 rounded-full bg-gray-100" data-id="${c.productId}">-</button><span class="w-8 text-center">${c.qty}</span><button class="qtyPlus w-7 h-7 rounded-full bg-gray-100" data-id="${c.productId}">+</button><button class="removeCartItem text-red-500 ml-2" data-id="${c.productId}"><i class="fas fa-trash"></i></button></div></div>`; }).join('');
      const subtotal = userCart.reduce((s, c) => s + (products.find(p=>p.id===c.productId)?.price * c.qty || 0), 0);
      const shipping = 10000;
      const total = subtotal + shipping;
      document.getElementById('cartTotal').innerHTML = `Subtotal: ${formatRupiah(subtotal)}<br>Ongkir: ${formatRupiah(shipping)}<br>Total: ${formatRupiah(total)}`;
      document.querySelectorAll('.qtyPlus').forEach(btn => btn.addEventListener('click', () => { const ci = carts.find(c => c.userId === currentUser.id && c.productId === parseInt(btn.dataset.id)); const p = products.find(p => p.id === parseInt(btn.dataset.id)); if (ci && p && ci.qty < p.stock) { ci.qty++; saveAll(); updateCartModalUI(); } else { showToast('Stok tidak mencukupi', 'info'); } }));
      document.querySelectorAll('.qtyMinus').forEach(btn => btn.addEventListener('click', () => { const ci = carts.find(c => c.userId === currentUser.id && c.productId === parseInt(btn.dataset.id)); if (ci && ci.qty > 1) { ci.qty--; saveAll(); updateCartModalUI(); } else if (ci) { carts = carts.filter(c => !(c.userId === currentUser.id && c.productId === ci.productId)); saveAll(); updateCartModalUI(); } }));
      document.querySelectorAll('.removeCartItem').forEach(btn => btn.addEventListener('click', () => { carts = carts.filter(c => !(c.userId === currentUser.id && c.productId === parseInt(btn.dataset.id))); saveAll(); updateCartModalUI(); renderApp(); }));
    }
  }

  function showCheckoutModal() {
    const userCart = carts.filter(c => c.userId === currentUser.id);
    const items = userCart.map(c => ({ ...c, product: products.find(p => p.id === c.productId) }));
    const subtotal = items.reduce((s, i) => s + i.product.price * i.qty, 0);
    const shipping = 10000;
    const total = subtotal + shipping;
    const primaryAddr = addresses.find(a => a.userId === currentUser.id && a.isPrimary);
    const modal = document.createElement('div'); modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center'; modal.innerHTML = `<div class="bg-white rounded-2xl w-full max-w-md p-6"><h2 class="text-xl font-bold mb-3">🛍️ Checkout</h2><div class="bg-gray-50 p-3 rounded-xl mb-3"><p class="text-sm font-medium">📍 Alamat Pengiriman</p><p class="text-sm">${primaryAddr?.address || 'Alamat belum diisi'}</p></div>${items.map(i => `<div class="flex justify-between py-2 text-sm"><span>${i.product.name} x${i.qty}</span><span>${formatRupiah(i.product.price * i.qty)}</span></div>`).join('')}<div class="flex justify-between py-1 text-sm border-t mt-2"><span>Ongkos Kirim</span><span>${formatRupiah(shipping)}</span></div><div class="flex justify-between py-2 font-bold text-lg"><span>Total</span><span>${formatRupiah(total)}</span></div><div class="mt-3"><label class="text-sm font-medium">Metode Pembayaran</label><select id="paymentMethod" class="w-full border rounded-xl p-2 mt-1"><option>QRIS (Scan QRIS)</option><option>Transfer Bank BCA/Mandiri</option><option>OVO / Dana / GoPay</option><option>COD (Bayar di Tempat)</option></select></div><div class="flex gap-3 mt-5"><button id="cancelCheckout" class="flex-1 border rounded-xl py-2">Batal</button><button id="confirmCheckout" class="flex-1 bg-accent text-white rounded-xl py-2">Pesan Sekarang</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('cancelCheckout')?.addEventListener('click', () => modal.remove());
    document.getElementById('confirmCheckout')?.addEventListener('click', () => { for (const item of items) { const product = products.find(p => p.id === item.productId); if (product) product.stock -= item.qty; orders.push({ id: Date.now() + item.productId, buyerId: currentUser.id, sellerId: item.product.sellerId, productId: item.product.id, productName: item.product.name, qty: item.qty, total: item.product.price * item.qty, status: 'Diproses', paymentMethod: document.getElementById('paymentMethod').value, address: primaryAddr?.address, trackingNumber: 'TRK' + Date.now(), createdAt: new Date().toISOString() }); addNotif(item.product.sellerId, '🛒 Pesanan Baru!', `${currentUser.name} memesan ${item.product.name} x${item.qty}`); addNotif(currentUser.id, '✅ Pesanan Berhasil', `Pesanan ${item.product.name} telah dibuat.`); } carts = carts.filter(c => c.userId !== currentUser.id); saveAll(); showToast('Pesanan berhasil dibuat! Cek "Pesanan Saya" untuk tracking', 'success'); modal.remove(); renderApp(); });
  }

  // ========== SELLER & FARMER DASHBOARD ==========
  function renderSellerApp(container) {
    const myProducts = products.filter(p => p.sellerId === currentUser.id);
    const incomingOrders = orders.filter(o => o.sellerId === currentUser.id);
    container.innerHTML = `<div class="min-h-screen bg-grayBg p-4"><div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold text-primary">PanganKu | ${currentUser.businessName || 'UMKM'}</h1><button id="logoutBtn" class="bg-red-100 px-4 py-2 rounded-full">Keluar</button></div><div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white p-5 rounded-2xl"><p class="text-2xl text-primary">${incomingOrders.length}</p><p>Pesanan Masuk</p></div><div class="bg-white p-5 rounded-2xl"><p class="text-2xl text-primary">${myProducts.length}</p><p>Produk Aktif</p></div></div><div class="bg-white rounded-2xl p-5 mb-6"><div class="flex justify-between"><h2 class="font-bold">📦 Kelola Produk</h2><button id="addProductBtn" class="bg-primary text-white px-4 py-1 rounded-full">+ Tambah</button></div><div class="grid grid-cols-4 gap-3 mt-4">${myProducts.map(p => `<div class="border p-2 rounded-xl"><div class="text-3xl">${p.image}</div><p class="font-semibold text-sm">${p.name}</p><p>${formatRupiah(p.price)}</p><button class="deleteProdBtn text-red-500 text-xs" data-id="${p.id}">Hapus</button></div>`).join('')}</div></div><div class="bg-white rounded-2xl p-5"><h2 class="font-bold">📋 Pesanan Masuk</h2>${incomingOrders.map(o => `<div class="border-b py-2"><p>${o.productName} x${o.qty} - ${formatRupiah(o.total)}</p><button class="updateStatusBtn bg-primary text-white text-xs px-3 py-1 rounded mt-1" data-id="${o.id}">Proses</button></div>`).join('')}</div></div>`;
    document.getElementById('addProductBtn')?.addEventListener('click', () => { const name = prompt('Nama produk'); const price = parseInt(prompt('Harga')); if (name && price) { products.push({ id: Date.now(), name, price, rating: 0, sold: 0, image: '🍱', sellerId: currentUser.id, sellerName: currentUser.businessName, stock: 10, description: 'Produk baru', location: 'Indonesia' }); saveAll(); renderApp(); } });
    document.querySelectorAll('.deleteProdBtn').forEach(btn => btn.addEventListener('click', () => { products = products.filter(p => p.id !== parseInt(btn.dataset.id)); saveAll(); renderApp(); }));
    document.querySelectorAll('.updateStatusBtn').forEach(btn => btn.addEventListener('click', () => { const order = orders.find(o => o.id === parseInt(btn.dataset.id)); if (order && order.status === 'Diproses') { order.status = 'Dikirim'; addNotif(order.buyerId, '📦 Pesanan Dikirim', `Pesanan ${order.productName} sedang dikirim`); saveAll(); renderApp(); } }));
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
  }

  function renderFarmerApp(container) {
    const myCrops = products.filter(p => p.sellerId === currentUser.id);
    container.innerHTML = `<div class="min-h-screen bg-grayBg p-4"><div class="flex justify-between items-center"><h1 class="text-2xl font-bold text-primary">PanganKu | ${currentUser.farmName || 'Petani'}</h1><button id="logoutBtn" class="bg-red-100 px-4 py-2 rounded-full">Keluar</button></div><div class="grid md:grid-cols-2 gap-4 mt-6"><div class="bg-white p-5 rounded-2xl"><p class="text-2xl text-primary">${myCrops.length}</p><p>Komoditas</p></div><div class="bg-white p-5 rounded-2xl"><p class="text-2xl text-accent">+42%</p><p>Permintaan</p></div></div><div class="mt-6 bg-white rounded-2xl p-5"><div class="flex justify-between"><h2 class="font-bold">🌾 Hasil Panen</h2><button id="addCropBtn" class="bg-primary text-white px-4 py-1 rounded-full">+ Tambah</button></div><div class="grid grid-cols-4 gap-3 mt-4">${myCrops.map(c => `<div class="border p-2 rounded-xl"><div class="text-3xl">🌽</div><p class="font-semibold text-sm">${c.name}</p><p>${formatRupiah(c.price)}</p><button class="deleteCropBtn text-red-500 text-xs" data-id="${c.id}">Hapus</button></div>`).join('')}</div></div><div class="mt-6 bg-white rounded-2xl p-5"><h2 class="font-bold">💡 Rekomendasi Pasar</h2><p>✅ Sayuran organik diminati tinggi</p><p>✅ Cabai rawit diprediksi naik</p></div></div>`;
    document.getElementById('addCropBtn')?.addEventListener('click', () => { const name = prompt('Nama komoditas'); const price = parseInt(prompt('Harga per kg')); if (name && price) { products.push({ id: Date.now(), name, price, rating: 0, sold: 0, image: '🌽', sellerId: currentUser.id, sellerName: currentUser.farmName, stock: 100, description: 'Panen segar', location: 'Bogor' }); saveAll(); renderApp(); } });
    document.querySelectorAll('.deleteCropBtn').forEach(btn => btn.addEventListener('click', () => { products = products.filter(p => p.id !== parseInt(btn.dataset.id)); saveAll(); renderApp(); }));
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
  }

  renderApp();
</script>
</body>
</html>
