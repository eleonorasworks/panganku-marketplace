    const root = document.getElementById('appRoot');

      else if(currentPage === 'register') root.innerHTML = renderRegisterPage();

      let extraHtml = '';
      if(regState.role === 'seller'){
        extraHtml = `<div class="space-y-4"><input type="text" id="businessName" placeholder="Business Name" class="w-full p-3 border rounded-xl"><input type="text" id="businessType" placeholder="Business Type (e.g., Catering, Snack)" class="w-full p-3 border rounded-xl"><input type="text" id="businessAddress" placeholder="Business Address" class="w-full p-3 border rounded-xl"><select id="productCategory" class="w-full p-3 border rounded-xl"><option>Food & Beverage</option><option>Snacks</option><option>Frozen Food</option></select><div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center"><i class="fas fa-upload text-gray-400"></i><p class="text-sm text-gray-500">KTP Photo (Upload demo)</p></div></div>`;
      } else if(regState.role === 'farmer'){
        extraHtml = `<div class="space-y-4"><input type="text" id="farmName" placeholder="Farm Name" class="w-full p-3 border rounded-xl"><input type="text" id="farmLocation" placeholder="Farm Location (City)" class="w-full p-3 border rounded-xl"><input type="text" id="cropsType" placeholder="Main Crops" class="w-full p-3 border rounded-xl"><input type="text" id="landSize" placeholder="Land Size (Hektar)" class="w-full p-3 border rounded-xl"><div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center"><i class="fas fa-upload text-gray-400"></i><p class="text-sm text-gray-500">KTP & Farm Photo (Demo)</p></div></div>`;
      } else {
        extraHtml = `<div class="text-center p-6 bg-gray-50 rounded-xl"><i class="fas fa-check-circle text-3xl text-primary"></i><p class="mt-2 text-gray-600">No additional information needed for Buyer account.</p></div>`;
      }
      return `
        <div class="min-h-screen bg-gradient-to-br from-primaryLight/30 to-white flex items-center justify-center p-6">
          <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-8">
            <button id="backToBasicInfo" class="text-gray-400 hover:text-primary mb-4 flex items-center gap-1 text-sm"><i class="fas fa-arrow-left"></i> Kembali</button>
            <div class="text-center"><h2 class="text-2xl font-bold text-gray-800">${regState.role === 'seller' ? 'UMKM Details' : (regState.role === 'farmer' ? 'Farm Details' : 'Almost there!')}</h2><p class="text-gray-500">Complete your profile</p></div>
            <div class="mt-6">${extraHtml}</div>
            <button id="completeRegistration" class="w-full mt-6 bg-primary text-white py-3 rounded-xl font-semibold hover:bg-primaryDark transition">Submit Registration</button>
          </div>
        </div>
      `;
    } else if(regState.step === 4){
      return `
        <div class="min-h-screen bg-gradient-to-br from-primaryLight/30 to-white flex items-center justify-center p-6">
          <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center">
            <i class="fas fa-clock text-5xl text-accent mb-4"></i>
            <h2 class="text-2xl font-bold text-gray-800">Verification in Progress</h2>
            <p class="text-gray-500 mt-2">Your data is being reviewed. This may take 1–2 days.<br>We'll notify you via email once verified.</p>
            <button id="backToLoginAfterReg" class="mt-6 bg-primary text-white px-6 py-2 rounded-full">Back to Login</button>
          </div>
        </div>
      `;
    }
    return '';
  }
  
  // ========== EVENT HANDLERS ==========
  function attachLandingEvents(){
    // Tombol kembali ke landing dari mana saja
    document.getElementById('backToLandingFromNav')?.addEventListener('click', () => { currentPage = 'landing'; renderApp(); });
    document.getElementById('backToLandingFromLogin')?.addEventListener('click', () => { currentPage = 'landing'; renderApp(); });
    document.getElementById('backToLandingFromReg')?.addEventListener('click', () => { currentPage = 'landing'; renderApp(); });
    
    document.getElementById('navLoginBtn')?.addEventListener('click', () => { currentPage = 'login'; renderApp(); });
    document.getElementById('navRegisterBtn')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('heroGetStarted')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('ctaRegisterNow')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('ctaJoinSeller')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; setTimeout(() => { const sellerCard = document.querySelector('.role-card[data-role="seller"]'); if(sellerCard) sellerCard.click(); }, 100); renderApp(); });
    document.getElementById('ctaJoinFarmer')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; setTimeout(() => { const farmerCard = document.querySelector('.role-card[data-role="farmer"]'); if(farmerCard) farmerCard.click(); }, 100); renderApp(); });
    document.getElementById('heroExplore')?.addEventListener('click', () => { alert("✨ Silakan login atau register untuk melihat produk segar dari petani dan UMKM!"); });
    
    // Login
    document.getElementById('doLoginBtn')?.addEventListener('click', () => {
      const email = document.getElementById('loginEmail')?.value;
      const pwd = document.getElementById('loginPassword')?.value;
      const user = usersDB.find(u => u.email === email && u.password === pwd);
      if(user){ setUserSession({...user}); currentPage = 'landing'; renderApp(); }
      else { const errDiv = document.getElementById('loginError'); if(errDiv) errDiv.classList.remove('hidden'); }
    });
    document.getElementById('goToRegisterBtn')?.addEventListener('click', () => { currentPage = 'register'; regState = { step: 1, role: null, formData: {} }; renderApp(); });
    document.getElementById('backToLoginFromReg')?.addEventListener('click', () => { currentPage = 'login'; renderApp(); });
    document.getElementById('backToLoginAfterReg')?.addEventListener('click', () => { currentPage = 'login'; renderApp(); });
    document.getElementById('backToRoleSelect')?.addEventListener('click', () => { regState.step = 1; renderApp(); });
    document.getElementById('backToBasicInfo')?.addEventListener('click', () => { regState.step = 2; renderApp(); });
    
    document.getElementById('nextToRoleFields')?.addEventListener('click', () => {
      const name = document.getElementById('regFullName')?.value;
      const email = document.getElementById('regEmail')?.value;
      const pwd = document.getElementById('regPassword')?.value;
      const confirm = document.getElementById('regConfirm')?.value;
      if(!name || !email || pwd !== confirm){ alert("Please fill all fields correctly and ensure passwords match."); return; }
      if(usersDB.find(u => u.email === email)){ alert("Email already registered. Please use another email."); return; }
      regState.formData = { name, email, password: pwd, phone: document.getElementById('regPhone')?.value, address: document.getElementById('regAddress')?.value };
      regState.step = 3;
      renderApp();
    });
    document.getElementById('completeRegistration')?.addEventListener('click', () => {
      const newId = Date.now();
      let userObj = { id: newId, role: regState.role, name: regState.formData.name, email: regState.formData.email, password: regState.formData.password, phone: regState.formData.phone, address: regState.formData.address, verified: false };
      if(regState.role === 'seller'){ userObj.businessName = document.getElementById('businessName')?.value; userObj.businessType = document.getElementById('businessType')?.value; }
      if(regState.role === 'farmer'){ userObj.farmName = document.getElementById('farmName')?.value; userObj.crops = document.getElementById('cropsType')?.value; userObj.landSize = document.getElementById('landSize')?.value; }
      usersDB.push(userObj); saveToLocal();
      regState.step = 4;
      renderApp();
    });
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', (e) => { regState.role = card.dataset.role; regState.step = 2; renderApp(); });
    });
    document.querySelectorAll('.toggle-pwd').forEach(icon => {
      icon.addEventListener('click', (e) => { const input = icon.previousElementSibling; if(input.type === 'password') input.type = 'text'; else input.type = 'password'; });
    });
  }
  
  // ========== DASHBOARD (BERANDA SETELAH LOGIN) dengan fitur lengkap ==========
  function attachDashboardEvents(){
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    // Tombol kembali ke landing (opsional)
    document.getElementById('backToLandingFromDashboard')?.addEventListener('click', () => { logout(); });
    
    // Buyer order
    document.querySelectorAll('.orderNowBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const prod = JSON.parse(btn.dataset.prod);
        const newOrder = { id: Date.now(), productId: prod.id, productName: prod.name, buyerId: currentUser.id, sellerId: prod.sellerId, status: 'Pending Payment', total: prod.price };
        ordersDB.push(newOrder); saveToLocal();
        alert(`💚 QRIS Payment Simulation\nProduct: ${prod.name}\nAmount: Rp ${prod.price.toLocaleString()}\nScan QR Code: PANGANKU-${prod.id}\n\n✅ Payment Successful!`);
        newOrder.status = 'Paid - Processing'; saveToLocal();
        renderApp();
      });
    });
    
    // Seller add product
    document.getElementById('addProductBtn')?.addEventListener('click', () => { document.getElementById('productModal')?.classList.remove('hidden'); });
    document.getElementById('closeModal')?.addEventListener('click', () => { document.getElementById('productModal')?.classList.add('hidden'); });
    document.getElementById('confirmAddProduct')?.addEventListener('click', () => {
      const name = document.getElementById('prodName')?.value;
      const price = parseInt(document.getElementById('prodPrice')?.value);
      const type = document.getElementById('prodType')?.value;
      if(name && price){ productsDB.push({ id: Date.now(), name, price, type, sellerId: currentUser.id, sellerName: currentUser.businessName || currentUser.name, image: '🍲' }); saveToLocal(); renderApp(); }
      else alert('Isi nama produk dan harga');
    });
    document.querySelectorAll('.deleteProductBtn, .deleteCropBtn').forEach(btn => {
      btn.addEventListener('click', () => { deleteProduct(parseInt(btn.dataset.id)); });
    });
    document.getElementById('addCropBtn')?.addEventListener('click', () => {
      let name = prompt('Nama komoditas / produk'), price = prompt('Harga (Rp)');
      if(name && price){ productsDB.push({ id: Date.now(), name, price: parseInt(price), type: 'subscription', sellerId: currentUser.id, sellerName: currentUser.farmName || currentUser.name }); saveToLocal(); renderApp(); }
    });
    document.getElementById('demoSubscribe')?.addEventListener('click', () => { alert('✅ Weekly Vegetable Subscription activated! You will receive fresh vegetables every week.'); });
  }
  
  // Dashboard Buyer
  function renderBuyerDashboard(){
    const available = productsDB.filter(p => p.type === 'preorder' || p.type === 'subscription');
    const myOrders = ordersDB.filter(o => o.buyerId === currentUser.id);
    return `<div class="bg-grayBg min-h-screen"><nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10"><div class="text-2xl font-bold text-primary">PanganKu <span class="text-accent">| Beranda Buyer</span></div><div class="flex items-center gap-4"><span class="text-gray-700">👋 ${currentUser.name}</span><button id="logoutBtn" class="bg-gray-200 px-4 py-2 rounded-full hover:bg-gray-300 transition">Logout</button></div></nav><div class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-6"><div class="md:col-span-2"><h2 class="text-2xl font-bold">🍽️ Produk Segar</h2><div class="grid sm:grid-cols-2 gap-4 mt-4">${available.map(p => `<div class="bg-white p-4 rounded-2xl shadow-sm card-hover"><i class="fas ${p.image === '🥬' ? 'fa-carrot' : 'fa-utensils'} text-3xl text-primary"></i><h3 class="font-bold text-lg mt-2">${p.name}</h3><p class="text-gray-500 text-sm">${p.description || ''}</p><p class="text-accent font-bold mt-2">Rp ${p.price.toLocaleString()}</p><button data-prod='${JSON.stringify(p)}' class="orderNowBtn w-full mt-3 bg-primary text-white py-2 rounded-xl hover:bg-primaryDark transition">${p.type === 'subscription' ? '📦 Subscribe' : '📝 Pre-Order'}</button></div>`).join('')}</div></div><div><div class="bg-white p-5 rounded-2xl shadow-sm"><h3 class="font-bold text-lg mb-3">📦 Pesanan Saya</h3>${myOrders.length ? myOrders.map(o => `<div class="border-b py-2"><p class="font-medium">${o.productName}</p><p class="text-sm text-gray-500">${o.status}</p></div>`).join('') : '<p class="text-gray-400 text-sm">Belum ada pesanan</p>'}</div><div class="mt-6 bg-gradient-to-r from-primaryLight to-white p-5 rounded-2xl"><i class="fas fa-qrcode text-2xl text-primary"></i><p class="font-bold mt-1">QRIS Payment Ready</p><p class="text-sm text-gray-500">Scan & bayar instan</p><button id="demoSubscribe" class="mt-3 bg-accent text-white px-4 py-2 rounded-full text-sm">🌿 Coba Subscription</button></div></div></div></div>`;
  }
  
  // Dashboard Seller (UMKM)
  function renderSellerDashboard(){
    const myProducts = productsDB.filter(p => p.sellerId === currentUser.id);
    return `<div class="bg-grayBg min-h-screen"><nav class="bg-white shadow-sm p-4 flex justify-between items-center"><div class="text-2xl font-bold text-primary">PanganKu <span class="text-accent">| Beranda UMKM</span></div><div><span class="text-gray-700 mr-4">🏪 ${currentUser.businessName || currentUser.name}</span><button id="logoutBtn" class="bg-gray-200 px-4 py-2 rounded-full">Logout</button></div></nav><div class="max-w-6xl mx-auto p-6"><div class="flex justify-between items-center"><h2 class="text-2xl font-bold">Produk Saya</h2><button id="addProductBtn" class="bg-primary text-white px-5 py-2 rounded-full hover:bg-primaryDark transition"><i class="fas fa-plus mr-1"></i> Tambah Produk</button></div><div class="grid sm:grid-cols-2 md:grid-cols-3 gap-5 mt-5">${myProducts.map(p => `<div class="bg-white p-4 rounded-2xl shadow-sm"><i class="fas fa-box-open text-2xl text-primary"></i><h3 class="font-bold mt-2">${p.name}</h3><p class="text-accent font-bold">Rp ${p.price.toLocaleString()}</p><p class="text-xs text-gray-500">${p.type === 'preorder' ? 'Pre-order' : 'Subscription'}</p><button data-id="${p.id}" class="deleteProductBtn text-red-500 text-sm mt-2 hover:underline">Hapus</button></div>`).join('')}</div><div class="mt-8 bg-white p-5 rounded-2xl shadow-sm"><h3 class="font-bold text-lg">📊 Analisis Penjualan</h3><p class="text-gray-600">Total Pesanan: ${ordersDB.filter(o => o.sellerId === currentUser.id).length}</p><div class="w-full bg-gray-200 rounded-full h-2 mt-2"><div class="bg-primary h-2 rounded-full" style="width: 65%"></div></div><p class="text-sm text-gray-500 mt-2">+23% dibanding minggu lalu</p></div></div><div id="productModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"><div class="bg-white p-6 rounded-2xl w-96"><h3 class="font-bold text-lg">Produk Baru</h3><input id="prodName" placeholder="Nama Produk" class="w-full border p-2 rounded mt-2"><input id="prodPrice" placeholder="Harga" type="number" class="w-full border p-2 rounded mt-2"><select id="prodType" class="w-full border p-2 rounded mt-2"><option value="preorder">Pre-order</option><option value="subscription">Subscription Mingguan</option></select><div class="flex gap-2 mt-4"><button id="closeModal" class="flex-1 bg-gray-300 py-2 rounded">Batal</button><button id="confirmAddProduct" class="flex-1 bg-primary text-white py-2 rounded">Simpan</button></div></div></div></div>`;
  }
  
  // Dashboard Farmer
  function renderFarmerDashboard(){
    const myCrops = productsDB.filter(p => p.sellerId === currentUser.id);
    return `<div class="bg-grayBg min-h-screen"><nav class="bg-white shadow-sm p-4 flex justify-between items-center"><div class="text-2xl font-bold text-primary">PanganKu <span class="text-accent">| Beranda Petani</span></div><div><span class="text-gray-700 mr-4">🌾 ${currentUser.farmName || currentUser.name}</span><button id="logoutBtn" class="bg-gray-200 px-4 py-2 rounded-full">Logout</button></div></nav><div class="max-w-6xl mx-auto p-6"><div class="flex justify-between items-center"><h2 class="text-2xl font-bold">Hasil Panen Saya</h2><button id="addCropBtn" class="bg-primary text-white px-5 py-2 rounded-full"><i class="fas fa-plus"></i> Tambah Komoditas</button></div><div class="grid md:grid-cols-3 gap-5 mt-5">${myCrops.map(c => `<div class="bg-white p-4 rounded-2xl shadow-sm"><i class="fas fa-seedling text-2xl text-primary"></i><h3 class="font-bold mt-2">${c.name}</h3><p class="text-accent font-bold">Rp ${c.price.toLocaleString()}</p><button data-id="${c.id}" class="deleteCropBtn text-red-500 text-sm mt-2">Hapus</button></div>`).join('')}</div><div class="mt-8 bg-white p-5 rounded-2xl shadow-sm"><h3 class="font-bold text-lg">📈 Tren Permintaan Pasar</h3><p class="text-gray-600">Permintaan tinggi: sayur organik, paket bundling</p><div class="mt-3 flex items-center gap-2"><i class="fas fa-chart-line text-accent"></i><span class="font-semibold">+35% permintaan bulan ini</span></div><div class="mt-4 bg-primaryLight p-3 rounded-xl"><p class="text-sm">💡 Tips: Tawarkan langganan mingguan untuk pendapatan stabil</p></div></div></div></div>`;
  }
  
  renderApp();
</script>
</body>
</html>
